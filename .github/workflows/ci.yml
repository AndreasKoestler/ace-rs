name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger. Use this to run the slow `native-sde` job against any branch
  # (e.g. a PR branch) on demand: Actions tab → CI → "Run workflow" → pick the
  # branch, or `gh workflow run ci.yml --ref <branch>`.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Core gate: builds, lints, and runs the suite on x86_64 Linux.
  # This compiles the native `dpbssd_hw` path (x86_64), but only *executes* the
  # scalar fallback unless the runner CPU happens to have AVX-VNNI-INT8 — native
  # *execution* is proven by the `native-sde` job below.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --verbose
      - run: cargo test --verbose

  # Native-path verification: executes the real VPDPBSSD instruction under Intel
  # SDE and asserts it matches the scalar oracle (see `hw_matches_scalar`). The
  # `ACE_REQUIRE_NATIVE=1` guard (`native_runs_when_required`) makes the job fail
  # if the native branch did NOT run, so this can never be a false green.
  #
  # SDE is x86-host-only. Intel distributes it free under the Intel Simplified
  # Software License, which permits redistribution of the *unmodified* Software
  # provided the license accompanies it. Intel's own download mirror sits behind
  # an AWS WAF that 202-challenges automated curl, so we self-host the verbatim
  # tarball as a GitHub Release asset on this repo (license attached on the same
  # release). Bump SDE_VERSION + SDE_URL together when upgrading: download the
  # new tarball from Intel, attach it (plus its LICENSE) to a new release, and
  # point SDE_URL at the new asset. This job is isolated from the `test` gate,
  # so a hosting problem fails only this job — the core gate stays green.
  # Alternative: a self-hosted x86_64 runner with an AVX-VNNI-INT8 CPU (Sierra
  # Forest / Granite Rapids / Arrow Lake).
  #
  # When it runs: on pushes to `main` (post-merge regression) and on manual
  # `workflow_dispatch` (run it against a PR branch on demand). It is skipped on
  # ordinary pull_request events so the fast `test` gate isn't held up by the
  # 33 MB download + emulated run on every push to a PR.
  native-sde:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    env:
      SDE_VERSION: "10.8.0-2026-03-15"
      # Self-hosted, unmodified SDE tarball (see release sde-10.8.0). Served by
      # GitHub with a clean 200 — no WAF, no auth.
      SDE_URL: "https://github.com/AndreasKoestler/ace-rs/releases/download/sde-10.8.0/sde-external-10.8.0-2026-03-15-lin.tar.xz"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Intel SDE
        run: |
          set -euo pipefail
          curl -fSL --retry 3 --retry-delay 5 "$SDE_URL" -o sde.tar.xz
          mkdir -p "$HOME/sde"
          tar -xf sde.tar.xz -C "$HOME/sde" --strip-components=1
          echo "$HOME/sde" >> "$GITHUB_PATH"
      - name: Verify SDE is runnable
        run: sde64 --version
      - name: Ensure an AVX10.2-capable C compiler (for the `native` feature)
        # The opt-in `native` feature compiles `src/native/avx10_v1_aux.c` with
        # `-mavx10.2` (design decision D7), which the `cc` crate drives via $CC.
        # AVX10.2 intrinsics require GCC >= 15 or Clang >= 20. Probe the runner's
        # default toolchains; fall back to an explicit gcc-15 install. Fail fast
        # with an actionable message if none is available, rather than emitting a
        # confusing mid-build cc error.
        run: |
          set -euo pipefail
          probe() { printf '#include <immintrin.h>\nint main(){return 0;}\n' | "$1" -mavx10.2 -x c -c - -o /dev/null 2>/dev/null; }
          if probe gcc; then echo "CC=gcc" >> "$GITHUB_ENV"
          elif probe clang; then echo "CC=clang" >> "$GITHUB_ENV"
          else
            sudo apt-get update && sudo apt-get install -y gcc-15
            probe gcc-15 || { echo "::error::No AVX10.2-capable C compiler (need GCC >= 15 or Clang >= 20) — cannot build the native feature"; exit 1; }
            echo "CC=gcc-15" >> "$GITHUB_ENV"
          fi
      - name: Run tests with the native paths executed under SDE
        env:
          # Force the differential + guard tests to require the native branch.
          ACE_REQUIRE_NATIVE: "1"
          # Make cargo run each test binary under SDE emulating a CPU that has
          # both AVX-VNNI-INT8 (group 1, iteration-0 `dpbssd`) and AVX10_V1_AUX
          # (group 2, families A-G). `-future` selects the newest model, which
          # exposes both; `-gnr` / `-srf` (Granite Rapids / Sierra Forest) have
          # AVX-VNNI-INT8 but not necessarily AVX10.2.
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -future --"
        # `--features native` compiles the AVX10_V1_AUX C shims and exercises the
        # families-A-G native-vs-oracle differential under SDE (group-1 `dpbssd`
        # uses the always-available stdlib intrinsic, so it runs either way). The
        # core `test` gate above still covers the default oracle-only build.
        run: cargo test --features native --target x86_64-unknown-linux-gnu --verbose
