name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger. Use this to run the slow `native-sde` job against any branch
  # (e.g. a PR branch) on demand: Actions tab → CI → "Run workflow" → pick the
  # branch, or `gh workflow run ci.yml --ref <branch>`.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Core gate: builds, lints, and runs the suite on x86_64 Linux.
  # This compiles the native `*_hw` paths (x86_64), but only *executes* the
  # scalar fallback unless the runner CPU happens to have AVX-VNNI-INT8 /
  # AVX-VNNI-INT16 — native *execution* is proven by the `native-sde` job below.
  # Runs on every push and pull_request as the fast scalar-only gate.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --verbose
      # Scalar-only suite. This also runs the net-new layer-2 encoding harness
      # (`tests/encoding.rs`): the golden `.byte` byte-sequence assertions for the
      # ACE group-4 primitives always run with NO external tool, and the
      # disassembly assertion skips-with-warning when no disassembler is present
      # (or when it does not yet know the ACE mnemonics) — never a failure.
      - run: cargo test --verbose
      - run: cargo test --verbose encoding

  # Native-path verification: executes the real group-1 multiply-accumulate
  # instructions (the avxvnniint8 byte ops AND the avxvnniint16 word ops) and,
  # via `--features native`, the group-2 AVX10_V1_AUX C-shim families under
  # Intel SDE, asserting each matches its scalar oracle (see `hw_matches_scalar`).
  # The `ACE_REQUIRE_NATIVE=1` guard (`native_runs_when_required`) makes the job
  # fail if a native branch did NOT run, so this can never be a false green.
  #
  # OQ-2 — the SDE arch flag must enable BOTH feature families.
  # The runner emulates a CPU whose CPUID reports both `avxvnniint8` and
  # `avxvnniint16`, because the suite exercises both families and the guard
  # (extended in phase 6 to a *dual*-feature assert) requires both to have been
  # detected at runtime. We use `-future` (the newest/broadest model) as the
  # default flag: it is the most likely single flag to enable both features.
  #   ⚠ UNVERIFIED LOCALLY: whether `sde64 -future` actually makes
  #   `is_x86_feature_detected!("avxvnniint16")` return true inside the emulated
  #   process can only be confirmed by an actual SDE run, which happens when this
  #   job runs on push-to-main / workflow_dispatch. It cannot be checked on the
  #   arm64 dev host or by `cargo` alone.
  #   If a CI run shows `avxvnniint16` undetected, the job fails LOUDLY (see
  #   below) — it does NOT go silently green. In that case switch the flag to
  #   `-gnr` (Granite Rapids) or `-srf` (Sierra Forest), whichever an empirical
  #   run confirms emulates both features, and update the RUNNER line below.
  # Why a wrong flag fails loudly instead of green: the dual-feature guard
  # asserts both tokens under ACE_REQUIRE_NATIVE=1. If the chosen flag enables
  # only avxvnniint8 (the `Int8Only` outcome), the word-op differential
  # properties discard and the guard panics with
  #   `ACE_REQUIRE_NATIVE=1 but avxvnniint16 is not detected — the native path
  #    was NOT exercised`
  # turning the job RED — a byte-only run can never masquerade as full coverage.
  #
  # SDE is x86-host-only. Intel distributes it free under the Intel Simplified
  # Software License, which permits redistribution of the *unmodified* Software
  # provided the license accompanies it. Intel's own download mirror sits behind
  # an AWS WAF that 202-challenges automated curl, so we self-host the verbatim
  # tarball as a GitHub Release asset on this repo (license attached on the same
  # release). Bump SDE_VERSION + SDE_URL together when upgrading: download the
  # new tarball from Intel, attach it (plus its LICENSE) to a new release, and
  # point SDE_URL at the new asset. This job is isolated from the `test` gate,
  # so a hosting problem fails only this job — the core gate stays green.
  # Alternative: a self-hosted x86_64 runner with an AVX-VNNI-INT8 /
  # AVX-VNNI-INT16 CPU (Sierra Forest / Granite Rapids / Arrow Lake).
  #
  # When it runs: on pushes to `main` (post-merge regression) and on manual
  # `workflow_dispatch` (run it against a PR branch on demand). It is skipped on
  # ordinary pull_request events so the fast `test` gate isn't held up by the
  # 33 MB download + emulated run on every push to a PR.
  native-sde:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    env:
      SDE_VERSION: "10.8.0-2026-03-15"
      # Self-hosted, unmodified SDE tarball (see release sde-10.8.0). Served by
      # GitHub with a clean 200 — no WAF, no auth.
      SDE_URL: "https://github.com/AndreasKoestler/ace-rs/releases/download/sde-10.8.0/sde-external-10.8.0-2026-03-15-lin.tar.xz"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Intel SDE
        run: |
          set -euo pipefail
          curl -fSL --retry 3 --retry-delay 5 "$SDE_URL" -o sde.tar.xz
          mkdir -p "$HOME/sde"
          tar -xf sde.tar.xz -C "$HOME/sde" --strip-components=1
          echo "$HOME/sde" >> "$GITHUB_PATH"
      - name: Verify SDE is runnable
        run: sde64 --version
      - name: Ensure an AVX10.2 + AMX-tile-capable C compiler (for the `native` feature)
        # The opt-in `native` feature compiles `src/native/avx10_v1_aux.c` with
        # `-mavx10.2` and `src/native/ace_tile.c` with `-mavx10.2 -mamx-tile
        # -mamx-avx512` (design decision D7 / OQ-6), which the `cc` crate drives
        # via $CC. The ACE group-4 tile shims use real AMX-TILE + AMX-AVX512
        # intrinsics for families A/B-read/C and `.byte` raw encodings for the
        # ACE-only rest, so the compiler must know all three ISA flags.
        # These require GCC >= 15 or Clang >= 20. Probe the runner's default
        # toolchains; fall back to an explicit gcc-15 install. Fail fast with an
        # actionable message if none is available, rather than emitting a
        # confusing mid-build cc error.
        run: |
          set -euo pipefail
          probe() { printf '#include <immintrin.h>\nint main(){return 0;}\n' | "$1" -mavx10.2 -mamx-tile -mamx-avx512 -x c -c - -o /dev/null 2>/dev/null; }
          if probe gcc; then echo "CC=gcc" >> "$GITHUB_ENV"
          elif probe clang; then echo "CC=clang" >> "$GITHUB_ENV"
          else
            # ubuntu-latest is 24.04 (noble); gcc-15 is NOT in the default repos,
            # so pull it from the ubuntu-toolchain-r/test PPA (has gcc-15 for noble).
            # Guard each step so a repo/apt failure surfaces the actionable error
            # below instead of dying silently under `set -e`.
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test \
              && sudo apt-get update \
              && sudo apt-get install -y gcc-15 \
              || echo "::warning::gcc-15 install from ubuntu-toolchain-r/test failed"
            probe gcc-15 || { echo "::error::No AVX10.2 + AMX-tile-capable C compiler (need GCC >= 15 or Clang >= 20) — cannot build the native feature"; exit 1; }
            echo "CC=gcc-15" >> "$GITHUB_ENV"
          fi
      - name: Run tests with the native paths executed under SDE
        env:
          # Force the differential + guard tests to require the native branch.
          ACE_REQUIRE_NATIVE: "1"
          # Make cargo run each test binary under SDE emulating a CPU that has
          # the full group-1 VNNI surface (AVX-VNNI-INT8 *and* AVX-VNNI-INT16)
          # plus AVX10_V1_AUX (group 2, families A-G) and AVX10_V2_AUX (group 3,
          # families A-I). `-future` selects the newest model and is our default
          # (OQ-2, see the block above), which exposes all of them; `-gnr` /
          # `-srf` (Granite Rapids / Sierra Forest) have AVX-VNNI-INT8 but not
          # necessarily AVX-VNNI-INT16 or AVX10.2 and are the documented
          # fallbacks. The dual-feature guard makes any wrong flag fail LOUDLY
          # rather than go silently green.
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -future --"
        # `--features native` compiles the AVX10_V1_AUX and AVX10_V2_AUX C shims
        # and the ACE group-4 tile shims (`src/native/ace_tile.c`), and exercises
        # the group-2 families-A-G native-vs-oracle differential under SDE
        # (group-1 `dpbssd` uses the always-available stdlib intrinsic, so it runs
        # either way). The group-3 (AVX10_V2_AUX) differentials DISCARD for now
        # (intrinsics absent from current GCC/Clang headers, OQ-5).
        #
        # ACE group 4 (iteration 3, OQ-6): the intrinsic families A / B-read / C
        # (tile config lifecycle, tile->ZMM read moves, tile-row converts) EXECUTE
        # under SDE, so their `prop_native_matches_oracle` differentials light up
        # here; the `ACE`-only families (B write, D, E, F, G) are `.byte` raw
        # encodings that are BUILT + encoding-asserted (`tests/encoding.rs`) but
        # not executed — SDE 10.8 has no ACE emulation yet (R2), so their
        # differentials DISCARD until a `sde64` ACE probe passes. The
        # `ace_tile_native_runs_when_required` guard stays dormant for them
        # (documented, non-vacuous), exactly as the AVX10 C-shim families' guard
        # does. The core `test` gate above still covers the default oracle-only
        # build and the always-run golden `.byte` encoding assertions.
        run: cargo test --features native --target x86_64-unknown-linux-gnu --verbose
